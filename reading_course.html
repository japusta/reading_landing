      ';</' + 'script>';

    // would push the parser into quirks mode. DOMParser always emits a <head>

solute;top:0;left:0;width:50%;height:100%;background:#f6efe6;background-image:radial-gradient(130% 120% at 100% 50%,rgba(58,42,28,.07),transparent 42%);border-radius:14px 0 0 14px;overflow:hidden;cursor:pointer\">\n        <div style=\"position:relative;height:100%;display:flex;flex-direction:column;padding:48px 50px;box-sizing:border-box\">\n          <div data-num=\"\" style=\"font:800 italic clamp(40px,4.4vw,58px)/1 'Nunito',sans-serif;color:#bd848b\">01<\u002Fdiv>\n          <div style=\"width:42px;height:3px;background:#e6b0b6;border-radius:2px;margin:18px 0 22px\"><\u002Fdiv>\n          <div data-illo=\"\" style=\"flex:1;min-height:0;display:flex;align-items:center;justify-content:center;width:100%;padding:10px 0 30px\"><\u002Fdiv>\n          <div data-body=\"\" style=\"font:500 clamp(15px,1.3vw,17px)/1.55 'Golos Text',sans-serif;color:#374729;text-align:center\">Сохраняешь списки «надо прочитать», но не открываешь их.<\u002Fdiv>\n          <div data-foot=\"\" style=\"margin-top:auto;font:600 12px/1 'Golos Text',sans-serif;color:rgba(176,124,131,.55);text-align:left\">1<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div ref=\"{{ pgRightRef }}\" onclick=\"{{ flipNext }}\" title=\"Дальше\" style=\"position:absolute;top:0;right:0;width:50%;height:100%;background:#f6efe6;background-image:radial-gradient(130% 120% at 0% 50%,rgba(58,42,28,.07),transparent 42%);border-radius:0 14px 14px 0;overflow:hidden;cursor:pointer\">\n        <div style=\"position:relative;height:100%;display:flex;flex-direction:column;padding:48px 50px;box-sizing:border-box\">\n          <div data-num=\"\" style=\"font:800 italic clamp(40px,4.4vw,58px)/1 'Nunito',sans-serif;color:#bd848b\">02<\u002Fdiv>\n          <div style=\"width:42px;height:3px;background:#e6b0b6;border-radius:2px;margin:18px 0 22px\"><\u002Fdiv>\n          <div data-illo=\"\" style=\"flex:1;min-height:0;display:flex;align-items:center;justify-content:center;width:100%;padding:10px 0 30px\"><\u002Fdiv>\n          <div data-body=\"\" style=\"font:500 clamp(15px,1.3vw,17px)/1.55 'Golos Text',sans-serif;color:#374729;text-align:center\">Берёшься за книгу и бросаешь на двадцатой странице, а потом винишь себя.<\u002Fdiv>\n          <div data-foot=\"\" style=\"margin-top:auto;font:600 12px/1 'Golos Text',sans-serif;color:rgba(176,124,131,.55);text-align:right\">2<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"position:absolute;top:0;bottom:0;left:50%;width:48px;transform:translateX(-50%);pointer-events:none;z-index:4;background:linear-gradient(90deg,rgba(58,42,28,0),rgba(58,42,28,.13),rgba(58,42,28,.04),rgba(58,42,28,.13),rgba(58,42,28,0))\"><\u002Fdiv>\n\n      <div ref=\"{{ leafRef }}\" data-leaf=\"\" style=\"position:absolute;top:0;left:50%;width:50%;height:100%;transform-origin:left center;transform-style:preserve-3d;transform:rotateY(0deg);z-index:5;visibility:hidden;will-change:transform;transition:transform 1s cubic-bezier(.52,.02,.22,1)\">\n        <div ref=\"{{ leafFrontRef }}\" style=\"position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;background:#f6efe6;background-image:radial-gradient(130% 120% at 0% 50%,rgba(58,42,28,.08),transparent 42%);border-radius:0 14px 14px 0;overflow:hidden;box-shadow:-1px 0 14px -4px rgba(58,42,28,.18)\">\n          <div style=\"position:relative;height:100%;display:flex;flex-direction:column;padding:48px 50px;box-sizing:border-box\">\n            <div data-num=\"\" style=\"font:800 italic clamp(40px,4.4vw,58px)/1 'Nunito',sans-serif;color:#bd848b\"><\u002Fdiv>\n            <div style=\"width:42px;height:3px;background:#e6b0b6;border-radius:2px;margin:18px 0 22px\"><\u002Fdiv>\n          <div data-illo=\"\" style=\"flex:1;min-height:0;display:flex;align-items:center;justify-content:center;width:100%;padding:10px 0 30px\"><\u002Fdiv>\n            <div data-body=\"\" style=\"font:500 clamp(15px,1.3vw,17px)/1.55 'Golos Text',sans-serif;color:#374729;text-align:center\"><\u002Fdiv>\n            <div data-foot=\"\" style=\"margin-top:auto;font:600 12px/1 'Golos Text',sans-serif;color:rgba(176,124,131,.55);text-align:right\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div ref=\"{{ leafBackRef }}\" style=\"position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;transform:rotateY(180deg);background:#f6efe6;background-image:radial-gradient(130% 120% at 100% 50%,rgba(58,42,28,.08),transparent 42%);border-radius:14px 0 0 14px;overflow:hidden;box-shadow:1px 0 14px -4px rgba(58,42,28,.18)\">\n          <div style=\"position:relative;height:100%;display:flex;flex-direction:column;padding:48px 50px;box-sizing:border-box\">\n            <div data-num=\"\" style=\"font:800 italic clamp(40px,4.4vw,58px)/1 'Nunito',sans-serif;color:#bd848b\"><\u002Fdiv>\n            <div style=\"width:42px;height:3px;background:#e6b0b6;border-radius:2px;margin:18px 0 22px\"><\u002Fdiv>\n          <div data-illo=\"\" style=\"flex:1;min-height:0;display:flex;align-items:center;justify-content:center;width:100%;padding:10px 0 30px\"><\u002Fdiv>\n            <div data-body=\"\" style=\"font:500 clamp(15px,1.3vw,17px)/1.55 'Golos Text',sans-serif;color:#374729;text-align:center\"><\u002Fdiv>\n            <div data-foot=\"\" style=\"margin-top:auto;font:600 12px/1 'Golos Text',sans-serif;color:rgba(176,124,131,.55);text-align:left\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div data-veil=\"\" style=\"position:absolute;inset:0;z-index:6;pointer-events:none;opacity:0;border-radius:0 14px 14px 0;backface-visibility:hidden;-webkit-backface-visibility:hidden;background:linear-gradient(95deg,rgba(40,27,15,.52),rgba(40,27,15,.10) 56%,rgba(40,27,15,0) 82%)\"><\u002Fdiv>\n        <div data-veil=\"\" style=\"position:absolute;inset:0;z-index:6;pointer-events:none;opacity:0;border-radius:14px 0 0 14px;backface-visibility:hidden;-webkit-backface-visibility:hidden;transform:rotateY(180deg);background:linear-gradient(95deg,rgba(40,27,15,.52),rgba(40,27,15,.10) 56%,rgba(40,27,15,0) 82%)\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:flex;align-items:center;gap:24px\">\n      <button ref=\"{{ prevRef }}\" onclick=\"{{ flipPrev }}\" aria-label=\"Назад\" style=\"all:unset;box-sizing:border-box;cursor:pointer;width:46px;height:46px;border-radius:50%;border:1px solid rgba(246,239,230,.2);display:flex;align-items:center;justify-content:center;font:400 20px/1 'Golos Text',sans-serif;color:#f6efe6;transition:background .25s ease,opacity .25s ease,border-color .25s ease\" style-hover=\"background:rgba(246,239,230,.1)\">←<\u002Fbutton>\n      <div ref=\"{{ dotsRef }}\" style=\"display:flex;align-items:center;gap:10px\">\n        <span style=\"width:9px;height:9px;border-radius:50%;background:#e6b0b6;transition:background .3s ease,transform .3s ease\"><\u002Fspan>\n        <span style=\"width:9px;height:9px;border-radius:50%;background:rgba(246,239,230,.22);transition:background .3s ease,transform .3s ease\"><\u002Fspan>\n        <span style=\"width:9px;height:9px;border-radius:50%;background:rgba(246,239,230,.22);transition:background .3s ease,transform .3s ease\"><\u002Fspan>\n      <\u002Fdiv>\n      <button ref=\"{{ nextRef }}\" onclick=\"{{ flipNext }}\" aria-label=\"Дальше\" style=\"all:unset;box-sizing:border-box;cursor:pointer;width:46px;height:46px;border-radius:50%;border:1px solid rgba(246,239,230,.2);display:flex;align-items:center;justify-content:center;font:400 20px/1 'Golos Text',sans-serif;color:#f6efe6;transition:background .25s ease,opacity .25s ease,border-color .25s ease\" style-hover=\"background:rgba(246,239,230,.1)\">→<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section style=\"background:#f6efe6;color:#374729\">\n  <div style=\"max-width:760px;margin:0 auto;padding:84px 32px;text-align:center\">\n    <div style=\"font:600 12px/1 'Golos Text',sans-serif;letter-spacing:.24em;text-transform:uppercase;color:#b98a90;margin-bottom:20px;animation:rise both;animation-timeline:view();animation-range:entry 4% cover 30%\">важно понять<\u002Fdiv>\n    <h2 style=\"font:900 clamp(32px,4.4vw,54px)/1.04 'Nunito',sans-serif;letter-spacing:-.02em;margin:0 0 8px;animation:rise both;animation-timeline:view();animation-range:entry 4% cover 30%\">Дело не в тебе<\u002Fh2>\n    <div style=\"font:500 italic clamp(20px,2.4vw,28px)/1.1 'Nunito',sans-serif;color:#b07c83;margin-bottom:26px;animation:rise both;animation-timeline:view();animation-range:entry 4% cover 30%\">так бывает у многих<\u002Fdiv>\n    <p style=\"font:400 18px/1.65 'Golos Text',sans-serif;color:rgba(55,71,41,.82);max-width:600px;margin:0 auto;animation:rise both;animation-timeline:view();animation-range:entry 4% cover 32%\">Если книги давно не радуют, это не лень и не приговор. Чаще всего удовольствие от чтения просто потерялось по дороге. Его можно вернуть, спокойно и в своем ритме.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section style=\"max-width:1160px;margin:0 auto;padding:92px 32px\">\n  <h2 style=\"font:900 clamp(30px,3.6vw,46px)/1.05 'Nunito',sans-serif;letter-spacing:-.015em;text-align:center;margin:0 0 48px;animation:rise both;animation-timeline:view();animation-range:entry 4% cover 26%\">Что ты получишь<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:18px\">\n    <div style=\"background:#f6efe6;color:#374729;border-radius:22px;padding:30px;animation:rise both;animation-timeline:view();animation-range:entry 2% cover 22%;transition:transform .4s cubic-bezier(.22,1,.36,1),box-shadow .4s ease\" style-hover=\"transform:translateY(-4px);box-shadow:0 24px 44px -28px rgba(0,0,0,.5)\"><div style=\"width:44px;height:44px;border-radius:13px;background:#f3dde1;display:flex;align-items:center;justify-content:center;margin-bottom:20px;font-size:20px;color:#b07c83\">✓<\u002Fdiv><h3 style=\"font:800 22px/1.1 'Nunito',sans-serif;margin:0 0 8px\">Разрешения<\u002Fh3><p style=\"font:400 15.5px/1.5 'Golos Text',sans-serif;color:rgba(55,71,41,.9);margin:0\">Можно бросать, читать лёгкое, слушать аудио. Без чувства вины<\u002Fp><\u002Fdiv>\n    <div style=\"background:#f6efe6;color:#374729;border-radius:22px;padding:30px;animation:rise both;animation-timeline:view();animation-range:entry 2% cover 22%;transition:transform .4s cubic-bezier(.22,1,.36,1),box-shadow .4s ease\" style-hover=\"transform:translateY(-4px);box-shadow:0 24px 44px -28px rgba(0,0,0,.5)\"><div style=\"width:44px;height:44px;border-radius:13px;background:#f3dde1;display:flex;align-items:center;justify-content:center;margin-bottom:20px;font-size:20px;color:#b07c83\">✓<\u002Fdiv><h3 style=\"font:800 22px/1.1 'Nunito',sans-serif;margin:0 0 8px\">Свой ритм<\u002Fh3><p style=\"font:400 15.5px/1.5 'Golos Text',sans-serif;color:rgba(55,71,41,.9);margin:0\">Десять минут в день вместо «подвига». Чтение под твою жизнь<\u002Fp><\u002Fdiv>\n    <div style=\"background:#f6efe6;color:#374729;border-radius:22px;padding:30px;animation:rise both;animation-timeline:view();animation-range:entry 2% cover 22%;transition:transform .4s cubic-bezier(.22,1,.36,1),box-shadow .4s ease\" style-hover=\"transform:translateY(-4px);box-shadow:0 24px 44px -28px rgba(0,0,0,.5)\"><div style=\"width:44px;height:44px;border-radius:13px;background:#f3dde1;display:flex;align-items:center;justify-content:center;margin-bottom:20px;font-size:20px;color:#b07c83\">✓<\u002Fdiv><h3 style=\"font:800 22px/1.1 'Nunito',sans-serif;margin:0 0 8px\">Ноль оценок<\u002Fh3><p style=\"font:400 15.5px/1.5 'Golos Text',sans-serif;color:rgba(55,71,41,.9);margin:0\">Никаких «правильных ответов» и экзаменов. Только твоя реакция<\u002Fp><\u002Fdiv>\n    <div style=\"background:#f6efe6;color:#374729;border-radius:22px;padding:30px;animation:rise both;animation-timeline:view();animation-range:entry 2% cover 22%;transition:transform .4s cubic-bezier(.22,1,.36,1),box-shadow .4s ease\" style-hover=\"transform:translateY(-4px);box-shadow:0 24px 44px -28px rgba(0,0,0,. ;color:rgba(246,239,230,.4);margin-top:6px\">© Зачитаться<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  steps = [\n    { t: 'Откуда барьер', d: 'Смотрим, что когда-то связало чтение с оценкой и правильным ответом. Назвать причину значит перестать винить себя.' },\n    { t: 'Разрешения', d: 'Выдаём себе право бросать книгу на любой странице, читать лёгкое и слушать аудио. Чтение перестаёт быть экзаменом.' },\n    { t: 'Маленькие победы', d: 'Возвращаемся к книге через короткие сессии по десять минут. Регулярный маленький контакт важнее редких подвигов.' },\n    { t: 'Свой ритм', d: 'Подбираем время, формат и жанры под твою настоящую жизнь — не «как надо», а так, как в радость именно тебе.' },\n    { t: 'Разговор без страха', d: 'Учимся делиться впечатлением от себя, без страха ответить «неправильно». Книга снова становится поводом для удовольствия.' },\n  ];\n  faq = [\n    { q: 'У меня совсем нет времени.', a: 'Курс построен на сессиях по десять минут. Это посильно даже в загруженный день.' },\n    { q: 'Это книжный клуб?', a: 'Нет. Клуб предполагает, что человек уже читает и готов обсуждать книги. Курс работает раньше: помогает снять барьер и вернуть само чтение. Обсуждение тут есть, но мягкое и по желанию.' },\n    { q: 'Нужно много читать внутри курса?', a: 'Нет. Курс намеренно не заваливает текстами, чтобы не повторять школьную перегрузку.' },\n    { q: 'Это терапия?', a: 'Нет. Это образовательный курс о привычках и установках. При необходимости подскажем, к какому специалисту обратиться.' },\n  ];\n  faqRefs = this.faq.map(() => React.createRef());\n  _openFaqPrev = -1;\n  state = { prog: 0, openFaq: -1 };\n  secRef = React.createRef();\n  panelRef = React.createRef();\n  _cur = 0;\n  frameRef = React.createRef();\n  hintRef = React.createRef();\n  points = [\n    { n: '01', t: 'Сохраняешь списки «надо прочитать», но не открываешь их' ier(.52,.02,.22,1)';\n    this.flipVeil(leaf, '1.05s');\n    requestAnimationFrame(() => {\n      book.style.transform = 'translateX(-25%)';\n      left.style.opacity = '0';\n      leaf.style.transform = 'rotateY(0deg)';\n    });\n    this.pAfter(() => { this.pFill(this.pRightRef.current, 'cover'); this.pOpen = false; this.pSpread = 0; this.pResetLeaf(); });\n  }\n  closeForward() {\n    if (!this.pOpen || this.pAnim) return;\n    this.pAnim = true;\n    const leaf = this.pLeafRef.current, book = this.pBookRef.current, left = this.pLeftRef.current, right = this.pRightRef.current;\n    const s = this.pSpread;\n    this.pFill(this.pLeafFrontRef.current, 2 * s + 1);\n    this.pFill(this.pLeafBackRef.current, 'back');\n    leaf.style.transition = 'none';\n    leaf.style.transform = 'rotateY(0deg)';\n    leaf.style.visibility = 'visible';\n    void leaf.offsetWidth;\n    leaf.style.transition = 'transform 1.05s cubic-bezier(.52,.02,.22,1)';\n    book.style.transition = 'transform 1.05s cubic-bezier(.52,.02,.22,1)';\n    right.style.transition = 'opacity .7s ease';\n    this.flipVeil(leaf, '1.05s');\n    requestAnimationFrame(() => {\n      book.style.transform = 'translateX(25%)';\n      right.style.opacity = '0';\n      leaf.style.transform = 'rotateY(-180deg)';\n    });\n    this.pAfter(() => { this.pFill(left, 'back'); left.style.transition = 'none'; left.style.opacity = '1'; this.pOpen = false; this.pBackClosed = true; this.pResetLeaf(); });\n  }\n  openFromBack() {\n    if (this.pAnim || !this.pBackClosed) return;\n    this.pAnim = true;\n    const leaf = this.pLeafRef.current, book = this.pBookRef.current, left = this.pLeftRef.current, right = this.pRightRef.current;\n    this.clearVeil(leaf);\n    leaf.style.transition = 'none';\n    leaf.style.visibility = 'hidden';\n    leaf.style.transform = 'rotateY(0deg)';\n    // Phase 1: the closed booklet turns over (back cover -> front cover) with a 3D swivel,\n    // then Phase 2 chains into the normal cover-opening flip
